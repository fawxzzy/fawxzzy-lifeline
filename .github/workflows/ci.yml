name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Validate fitness manifest
        run: pnpm lifeline validate examples/fitness-app.lifeline.yml

      - name: Validate Playbook UI manifest
        run: pnpm lifeline validate examples/playbook-ui.lifeline.yml

      - name: Smoke preflight
        run: node scripts/lib/ensure-built.mjs

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lifeline-dist
          path: dist
          if-no-files-found: error

  smoke-suite-matrix:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine smoke suites
        id: suites
        run: |
          suites_json=$(node -e "const suites=require('./scripts/smoke-suites.json'); process.stdout.write(JSON.stringify(Object.keys(suites)));")
          echo "suites=$suites_json" >> "$GITHUB_OUTPUT"

  smoke-suites:
    name: smoke-suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs:
      - validate
      - smoke-suite-matrix
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.smoke-suite-matrix.outputs.suites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lifeline-dist
          path: dist

      - name: Smoke preflight
        run: node scripts/lib/ensure-built.mjs

      - name: Run smoke suite
        run: node scripts/smoke-suite-runner.mjs ${{ matrix.suite }}

  deterministic-suite-matrix:
    runs-on: ubuntu-latest
    needs: validate
    outputs:
      suites: ${{ steps.suites.outputs.suites }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine deterministic suites
        id: suites
        run: |
          suites_json=$(node -e "const suites=require('./scripts/test-suites.json'); process.stdout.write(JSON.stringify(Object.keys(suites)));")
          echo "suites=$suites_json" >> "$GITHUB_OUTPUT"

  deterministic-suites:
    name: deterministic-suite (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs:
      - validate
      - deterministic-suite-matrix
    strategy:
      fail-fast: false
      matrix:
        suite: ${{ fromJson(needs.deterministic-suite-matrix.outputs.suites) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: lifeline-dist
          path: dist

      - name: Run deterministic suite
        run: node scripts/test-runner.mjs ${{ matrix.suite }}
