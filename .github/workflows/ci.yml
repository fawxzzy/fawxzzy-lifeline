name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.6.5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build

      - name: Validate fitness manifest
        run: pnpm lifeline validate examples/fitness-app.lifeline.yml

      - name: Validate Playbook UI manifest
        run: pnpm lifeline validate examples/playbook-ui.lifeline.yml

      - name: Runtime smoke verification
        run: pnpm smoke:runtime

      - name: Playbook resolution smoke verification
        run: pnpm smoke:playbook
