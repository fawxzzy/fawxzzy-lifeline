name: playbook-ui
archetype: next-web
repo: git@github.com:fawxzzy/playbook-ui.git
branch: main
installCommand: pnpm install --frozen-lockfile
buildCommand: pnpm build
startCommand: pnpm start
port: 3100
healthcheckPath: /api/health
env:
  mode: file
  file: .env.production
  required:
    - PLAYBOOK_API_URL
    - SESSION_SECRET
deploy:
  strategy: rebuild
  workingDirectory: /srv/playbook-ui
