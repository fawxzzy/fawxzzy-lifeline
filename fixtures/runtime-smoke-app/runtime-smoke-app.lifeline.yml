name: runtime-smoke-app
archetype: node-web
repo: local-fixture
branch: main
installCommand: node -e "console.log('install ok')"
buildCommand: node -e "console.log('build ok')"
startCommand: node server.js
port: 6062
healthcheckPath: /healthz
env:
  mode: file
  file: .env.runtime
  requiredKeys:
    - PORT
    - SMOKE_TOKEN
deploy:
  strategy: rebuild
  workingDirectory: .

runtime:
  restartPolicy: on-failure
  restorable: true
